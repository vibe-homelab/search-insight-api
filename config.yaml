# Search Insight API Configuration
# Updated: 2026-03 — LanceDB + Language Insight API embeddings

embedding:
  # Use Language Insight API for embeddings
  endpoint: "http://localhost:8400/v1/embeddings"
  model: "embedding"
  dimensions: 768

storage:
  type: "lancedb"
  path: "./data/lancedb"

gateway:
  host: "0.0.0.0"
  port: 8600
  api_key: ""

chunking:
  max_chunk_size: 1000
  overlap: 200
  separators: ["\n\n", "\n", ". ", " "]
